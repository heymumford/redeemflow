app = "redeemflow-landing"
primary_region = "ord"

[build]

[env]
  DB_PATH = "/data/signups.db"

[mounts]
  source = "signups_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
