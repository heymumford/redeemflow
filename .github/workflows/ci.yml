name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run ruff check src/ tests/ landing/server.py
      - run: uv run ruff format --check src/ tests/ landing/server.py

  unit-and-fitness:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Unit + fitness tests with coverage
        run: >
          uv run pytest tests/unit/ tests/fitness/
          -v --cache-clear --tb=short
          --cov=redeemflow --cov-report=term-missing --cov-fail-under=80

  contract-and-integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run pytest tests/contract/ tests/integration/ tests/infrastructure/ -v --cache-clear --tb=short

  e2e:
    runs-on: ubuntu-latest
    needs: [unit-and-fitness, contract-and-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run pytest tests/e2e/ -v --cache-clear --tb=short

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: Dependency audit
        run: uv run pip-audit --strict --desc
      - name: Static security analysis
        run: uv run bandit -r src/redeemflow/ -ll -q

  frontend-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
